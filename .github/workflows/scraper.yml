name: Scraper Precios

on:
  schedule:
    - cron: '0 */2 * * *'      # cada 2 horas
  workflow_dispatch:          # ejecutar manualmente desde la pestaña Actions
  push:
    paths:
      - 'scraper.py'
      - '.github/workflows/scraper.yml'

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install curl_cffi beautifulsoup4

      - name: Ejecutar scraper
        run: python scraper.py

      - name: Commitear y pushear products.json
        run: |
          git config --global user.name "PriceHunt Bot"
          git config --global user.email "bot@users.noreply.github.com"
          git add data/products.json
          if git diff --cached --quiet; then
            echo "Sin cambios en los precios."
          else
            git commit -m "Actualizar precios $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
