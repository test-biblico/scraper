<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PriceHunt - Comparador de Supermercados</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--bg:#080c0a;--bg2:#0e1512;--card:#131d17;--fg:#e2ede6;--muted:#5e8a72;--accent:#10b981;--border:#1a2f24;--danger:#ef4444}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--fg)}
h1,h2,h3{font-family:'Space Grotesk',sans-serif}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;transition:all .2s}
.card:hover{border-color:rgba(16,185,129,.3)}
.input{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--fg);font-size:.85rem;width:100%;outline:none;transition:border .2s}
.input:focus{border-color:var(--accent)}
.input::placeholder{color:var(--muted)}
.btn{padding:10px 20px;border-radius:8px;border:none;cursor:pointer;font-size:.85rem;font-weight:600;display:inline-flex;align-items:center;gap:8px;transition:all .2s}
.btn-p{background:var(--accent);color:#000}.btn-p:hover{opacity:.85}
.btn-g{background:transparent;border:1px solid var(--border);color:var(--muted)}.btn-g:hover{color:var(--fg);border-color:var(--muted)}
.btn-danger{background:transparent;border:1px solid rgba(239,68,68,.3);color:var(--danger)}.btn-danger:hover{background:rgba(239,68,68,.1)}
.btn:disabled{opacity:.4;cursor:not-allowed}
table{width:100%;border-collapse:collapse}
th{background:var(--bg2);padding:10px 14px;text-align:left;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-bottom:1px solid var(--border)}
td{padding:10px 14px;border-bottom:1px solid rgba(26,47,36,.4);font-size:.85rem}
tr:hover td{background:rgba(16,185,129,.02)}
.badge-ok{background:#065f46;color:#6ee7b7;font-size:.65rem;padding:2px 6px;border-radius:10px;font-weight:700}
.toast{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--border);padding:14px 22px;border-radius:12px;z-index:99;display:flex;align-items:center;gap:10px;animation:slideIn .3s ease;box-shadow:0 10px 30px rgba(0,0,0,.4)}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.tag{background:var(--bg);padding:2px 8px;border-radius:6px;font-size:.7rem;color:var(--accent);font-weight:600}
.loading-spinner{border:3px solid var(--border);border-top:3px solid var(--accent);border-radius:50%;width:20px;height:20px;animation:spin 1s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.site-pill{padding:2px 8px;border-radius:10px;font-size:.68rem;font-weight:700}
.site-Supermas{background:#0e3b2e;color:#6ee7b7}
.site-Stock{background:#1e2a4d;color:#93c5fd}
.site-pill-empty{background:#2a2a2a;color:#888}
</style>
</head>
<body>
<div style="max-width:1100px;margin:0 auto;padding:24px">

  <header style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:16px">
    <div>
      <h1 style="font-size:1.5rem;font-weight:700;display:flex;align-items:center;gap:10px">
        <i class="fas fa-tags" style="color:var(--accent)"></i> PriceHunt
      </h1>
      <p style="font-size:.8rem;color:var(--muted);margin-top:2px">Compara precios: Supermas vs Stock</p>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-g" onclick="loadData()"><i class="fas fa-rotate"></i> Recargar</button>
      <button class="btn btn-p" onclick="exportCSV()"><i class="fas fa-download"></i> Exportar</button>
      <button class="btn btn-g" disabled title="Próximamente: añade más supermercados al comparador"><i class="fas fa-plus"></i> Agregar supermercado</button>
    </div>
  </header>

  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px" id="stats">
    <div class="card" style="padding:16px"><div style="font-size:1.5rem;font-weight:700;font-family:'Space Grotesk'" id="stTotal">-</div><div style="font-size:.75rem;color:var(--muted)">Productos</div></div>
    <div class="card" style="padding:16px"><div style="font-size:1.5rem;font-weight:700;font-family:'Space Grotesk';color:var(--accent)" id="stMin">-</div><div style="font-size:.75rem;color:var(--muted)">Más barato</div></div>
    <div class="card" style="padding:16px"><div style="font-size:1.5rem;font-weight:700;font-family:'Space Grotesk'" id="stSites">-</div><div style="font-size:.75rem;color:var(--muted)">Supermercados</div></div>
  </div>

  <div class="card" style="padding:16px;margin-bottom:20px">
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px">
      <div style="position:relative;grid-column:span 2">
        <i class="fas fa-search" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.8rem"></i>
        <input class="input" id="search" placeholder="Buscar producto..." oninput="renderTable()" style="padding-left:34px">
      </div>
      <select class="input" id="siteFilter" onchange="renderTable()">
        <option value="">Todos los supermercados</option>
      </select>
      <select class="input" id="brandFilter" onchange="renderTable()">
        <option value="">Todas las marcas</option>
      </select>
      <select class="input" id="measureFilter" onchange="renderTable()">
        <option value="">Todas las medidas</option>
      </select>
    </div>
  </div>

  <div class="card" style="overflow:hidden">
    <div style="overflow-x:auto;max-height:62vh;overflow-y:auto">
      <table>
        <thead><tr><th>Producto</th><th>Supermercado</th><th>Marca</th><th>Medida</th><th>Precio</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div id="emptyState" style="padding:50px;text-align:center">
      <i class="fas fa-inbox" style="font-size:2rem;color:var(--border);margin-bottom:10px;display:block"></i>
      <p style="color:var(--muted)">Esperando datos. Pulsa Recargar.</p>
    </div>
  </div>

</div>

<div id="toastBox"></div>

<script>
var products = [];
var currency = "Gs.";

function fmt(n){ if(n==null) return "-"; return currency + " " + n.toLocaleString("es-PY",{maximumFractionDigits:0}); }

function norm(s){ return (s||"").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/[^a-z0-9 ]/g,"").replace(/\s+/g," ").trim(); }

// Carga products.json con fallback para file:// (doble clic) y para Pages.
async function loadData(){
  var sources = ["data/products.json?t="+Date.now(), "data/products.json"];
  var loaded = false;
  for(var i=0;i<sources.length && !loaded;i++){
    try{
      var p = await fetch(sources[i]);
      if(!p.ok) continue;
      products = await p.json();
      loaded = true;
    }catch(e){ /* probar siguiente */ }
  }
  if(!loaded || !products.length){
    products=[];
    showToast("Sin datos","No se pudo cargar data/products.json. Si abriste el archivo con doble clic, sírvelo por HTTP o usa la web.", "error");
    initFilters(); renderTable(); updateStats();
    return;
  }
  initFilters();
  renderTable();
  updateStats();
}

function initFilters(){
  var sites={}, brands={}, measures={};
  products.forEach(function(x){
    if(x.site) sites[x.site]=true;
    if(x.brand) brands[x.brand]=true;
    if(x.measure) measures[x.measure]=true;
  });
  var sf=document.getElementById("siteFilter");
  sf.innerHTML='<option value="">Todos los supermercados</option>';
  Object.keys(sites).forEach(function(s){ var o=document.createElement("option"); o.value=s; o.textContent=s; sf.appendChild(o); });
  var bf=document.getElementById("brandFilter");
  bf.innerHTML='<option value="">Todas las marcas</option>';
  Object.keys(brands).sort().forEach(function(b){ var o=document.createElement("option"); o.value=b; o.textContent=b; bf.appendChild(o); });
  var mf=document.getElementById("measureFilter");
  mf.innerHTML='<option value="">Todas las medidas</option>';
  Object.keys(measures).sort().forEach(function(m){ var o=document.createElement("option"); o.value=m; o.textContent=m; mf.appendChild(o); });
}

function updateStats(){
  if(!products.length){ stTotal.textContent="-"; stMin.textContent="-"; stSites.textContent="-"; return; }
  var prices=products.map(function(x){return x.price;});
  stTotal.textContent=products.length;
  stMin.textContent=fmt(Math.min.apply(null,prices));
  var sites={}; products.forEach(function(x){sites[x.site]=true;});
  stSites.textContent=Object.keys(sites).length;
}

function renderTable(){
  var q=document.getElementById("search").value.toLowerCase();
  var site=document.getElementById("siteFilter").value;
  var brand=document.getElementById("brandFilter").value;
  var measure=document.getElementById("measureFilter").value;
  var filtered=products.filter(function(p){
    var nm=(p.name||"").toLowerCase();
    return (!q || nm.indexOf(q)!==-1)
        && (!site || p.site===site)
        && (!brand || p.brand===brand)
        && (!measure || p.measure===measure);
  });
  filtered.sort(function(a,b){ return a.price-b.price; });
  var tbody=document.getElementById("tbody");
  var empty=document.getElementById("emptyState");
  if(!filtered.length){ tbody.innerHTML=""; empty.style.display=""; return; }
  empty.style.display="none";
  var minPrice=filtered[0].price;
  var limit=Math.min(filtered.length,500);
  var html="";
  for(var j=0;j<limit;j++){
    var d=filtered[j];
    var imgHtml=d.image
      ? '<img src="'+d.image+'" style="width:40px;height:40px;border-radius:6px;object-fit:cover;background:var(--bg)" onerror="this.style.display=\'none\'">'
      : '<div style="width:40px;height:40px;border-radius:6px;background:var(--bg2);flex-shrink:0"></div>';
    var priceStyle=d.price===minPrice?'color:var(--accent)':'';
    var badgeHtml=d.price===minPrice?'<span class="badge-ok" style="margin-left:6px">MÍNIMO</span>':'';
    var pill=d.site?'<span class="site-pill site-'+d.site+'">'+d.site+'</span>':'<span class="site-pill site-pill-empty">?</span>';
    var brandHtml=d.brand?'<span class="tag">'+d.brand+'</span>':'<span style="color:var(--border)">-</span>';
    var measureHtml=d.measure?d.measure:'<span style="color:var(--border)">-</span>';
    html+='<tr>';
    html+='  <td><div style="display:flex;align-items:center;gap:10px">'+imgHtml+'<span style="font-weight:500">'+d.name+'</span></div></td>';
    html+='  <td>'+pill+'</td>';
    html+='  <td>'+brandHtml+'</td>';
    html+='  <td>'+measureHtml+'</td>';
    html+='  <td><span style="font-family:Space Grotesk;font-weight:700;'+priceStyle+'">'+fmt(d.price)+'</span>'+badgeHtml+(d.url?' <a href="'+d.url+'" target="_blank" style="color:var(--muted);font-size:.75rem"><i class="fas fa-external-link-alt"></i></a>':'')+'</td>';
    html+='</tr>';
  }
  tbody.innerHTML=html;
}

function exportCSV(){
  if(!products.length){ showToast("Sin datos","No hay productos para exportar","warn"); return; }
  var csv="Supermercado,Marca,Medida,Nombre,Precio,URL\n";
  for(var i=0;i<products.length;i++){
    var d=products[i];
    csv+='"'+d.site+'"'+',"'+String(d.brand||"").replace(/"/g,'""')+'"'+',"'+String(d.measure||"").replace(/"/g,'""')+'"'+',"'+d.name.replace(/"/g,'""')+'"'+',"'+fmt(d.price)+'"'+',"'+String(d.url||"").replace(/"/g,'""')+'"\n';
  }
  var blob=new Blob(["﻿"+csv],{type:"text/csv;charset=utf-8;"});
  var a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="precios_comparados.csv"; a.click();
  showToast("Exportado","CSV descargado correctamente","ok");
}

function showToast(title,msg,type){
  var c=document.getElementById("toastBox");
  var icon=type==="ok"?"fa-check-circle":"fa-exclamation-triangle";
  var color=type==="ok"?"var(--accent)":"var(--danger)";
  var el=document.createElement("div"); el.className="toast";
  el.innerHTML='<i class="fas '+icon+'" style="color:'+color+';font-size:1.1rem"></i><div><div style="font-weight:600;font-size:.85rem">'+title+'</div><div style="font-size:.78rem;color:var(--muted);max-width:300px">'+msg+'</div></div>';
  c.appendChild(el);
  setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); },5000);
}

window.onload=function(){ try{ loadData(); }catch(e){ console.error(e); } };
</script>
</body>
</html>
